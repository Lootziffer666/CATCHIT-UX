<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CatchIt Quick Change – Snack oder späterer Bus</title>
  
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Archivo+Narrow:wght@400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <style>
    :root{
      --blue1:#4DB9E6; --blue2:#2EA7E0; --blue3:#1F4B8F;
      --white:rgba(255,255,255,.96); --white-soft:rgba(255,255,255,.84); --white-faint:rgba(255,255,255,.56);
      --glass:rgba(255,255,255,.14); --border:rgba(255,255,255,.10); --active:rgba(255,255,255,.22);
      --mint:rgba(136,249,173,.28); --mint-border:rgba(136,249,173,.22);
      --shadow:0 18px 42px rgba(20,55,105,.14);
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#edf3f9;padding:24px;font-family:"Archivo Narrow",sans-serif;}
    .phone{width:390px;height:844px;border-radius:30px;overflow:hidden;position:relative;color:var(--white);
      background:linear-gradient(180deg,var(--blue1) 0%, var(--blue2) 46%, var(--blue3) 100%);box-shadow:0 30px 70px rgba(31,75,143,.22);}
    .glow{position:absolute;right:-56px;top:-56px;width:220px;height:220px;border-radius:50%;
      background:radial-gradient(circle, rgba(255,255,255,.12) 0%, rgba(255,255,255,0) 72%);}
    .header{position:absolute;left:0;right:0;top:0;padding:28px 24px;display:flex;justify-content:space-between;align-items:center;z-index:10;}
    .icon{font-family:"Material Symbols Outlined";font-size:28px;line-height:1}
    .top{position:absolute;left:0;right:0;top:122px;padding:0 26px;z-index:8;}
    .kicker{font-size:12px;line-height:1;text-transform:uppercase;letter-spacing:.16em;color:var(--white-faint);font-weight:700;margin-bottom:18px;}
    .headline{font-family:"Luckiest Guy",cursive;font-size:40px;line-height:.96;letter-spacing:.01em;margin:0;max-width:286px;}
    .sub{margin-top:14px;max-width:296px;font-size:20px;line-height:1.12;color:var(--white-soft);font-weight:600;}

    .choice-stack{position:absolute;left:18px;right:18px;top:308px;display:grid;gap:14px;z-index:6;}
    .choice{appearance:none;border:1px solid var(--border);background:var(--glass);color:var(--white);
      border-radius:24px;min-height:112px;padding:16px 16px 14px;text-align:left;cursor:pointer;
      backdrop-filter:blur(10px);box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:flex-start;gap:14px;}
    .choice.primary{background:var(--active);border-color:rgba(255,255,255,.14);}
    .choice.recommended{background:var(--mint);border-color:var(--mint-border);}
    .choice-left{display:flex;flex-direction:column;gap:6px;min-width:0}
    .choice-kicker{font-size:10px;line-height:1;text-transform:uppercase;letter-spacing:.18em;color:var(--white-faint);font-weight:700}
    .choice-title{font-size:28px;line-height:1;font-weight:700;color:var(--white)}
    .choice-copy{font-size:16px;line-height:1.08;color:var(--white-soft);font-weight:700;max-width:220px}
    .choice-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;white-space:nowrap}
    .choice-time{font-size:22px;line-height:1;font-weight:700;color:var(--white)}
    .choice-tag{font-size:14px;line-height:1;font-weight:700;color:var(--white-soft)}

    .impact-card{position:absolute;left:18px;right:18px;bottom:18px;border-radius:18px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(8px);padding:12px 14px 11px;display:flex;justify-content:space-between;align-items:flex-end;gap:12px;z-index:6;}
    .impact-left{display:flex;flex-direction:column;gap:4px}
    .impact-label{font-size:10px;line-height:1;text-transform:uppercase;letter-spacing:.18em;color:var(--white-faint);font-weight:700}
    .impact-value{font-size:22px;line-height:1;font-weight:700;color:var(--white)}
    .impact-sub{font-size:15px;line-height:1.1;color:var(--white-soft)}
    .impact-right{display:flex;align-items:center;gap:6px;font-size:18px;line-height:1;font-weight:700;color:var(--white);white-space:nowrap}
  </style>
</head>
<body>
  <main class="phone">
    <div class="glow"></div>
    <header class="header">
      <div class="icon">arrow_back</div>
      <div class="icon">more_vert</div>
    </header>

    <section class="top">
      <div class="kicker">Quick Change</div>
      <h1 class="headline">Kleine Änderung?</h1>
      <div class="sub">CatchIt kann den Ablauf schnell neu sortieren, ohne die ganze Planung neu aufzubauen.</div>
    </section>

    <section class="choice-stack">
      <button class="choice recommended">
        <div class="choice-left">
          <div class="choice-kicker">Empfohlen</div>
          <div class="choice-title">Snack später</div>
          <div class="choice-copy">Schule und Rückweg bleiben stabil. Der Zwischenstopp rutscht nach hinten.</div>
        </div>
        <div class="choice-right">
          <div class="choice-time">+0</div>
          <div class="choice-tag">tragfähig</div>
        </div>
      </button>

      <button class="choice primary">
        <div class="choice-left">
          <div class="choice-kicker">Alternative</div>
          <div class="choice-title">Späteren Bus nehmen</div>
          <div class="choice-copy">Mehr Luft, aber der Rest verschiebt sich leicht nach hinten.</div>
        </div>
        <div class="choice-right">
          <div class="choice-time">+17</div>
          <div class="choice-tag">heute passend</div>
        </div>
      </button>

      <button class="choice">
        <div class="choice-left">
          <div class="choice-kicker">Nur für heute</div>
          <div class="choice-title">Zwischenstopp streichen</div>
          <div class="choice-copy">CatchIt behandelt den Hauptweg heute als einzige Priorität.</div>
        </div>
        <div class="choice-right">
          <div class="choice-time">1x</div>
          <div class="choice-tag">direkt</div>
        </div>
      </button>
    </section>

    <section class="impact-card">
      <div class="impact-left">
        <div class="impact-label">Wirkung</div>
        <div class="impact-value">Tippen sortiert sofort um</div>
        <div class="impact-sub">Kein extra Bestätigen. CatchIt springt direkt in die neue tragfähige Variante.</div>
      </div>
      <div class="impact-right">
        <span class="icon" style="font-size:20px;">touch_app</span>
        <span>1 Tap</span>
      </div>
    </section>
  </main>
</body>
</html>
