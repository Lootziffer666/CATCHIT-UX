<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CatchIt Wizard – Bewegungsstil / Tageslage</title>
  
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Archivo+Narrow:wght@400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <style>
    :root{
      --blue1:#4DB9E6; --blue2:#2EA7E0; --blue3:#1F4B8F;
      --white:rgba(255,255,255,.96); --white-soft:rgba(255,255,255,.84); --white-faint:rgba(255,255,255,.56);
      --glass:rgba(255,255,255,.14); --glass-strong:rgba(255,255,255,.18); --border:rgba(255,255,255,.10);
      --active:rgba(255,255,255,.24); --shadow:0 18px 42px rgba(20,55,105,.14);
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#edf3f9;padding:24px;font-family:"Archivo Narrow",sans-serif;}
    .phone{width:390px;height:844px;border-radius:30px;overflow:hidden;position:relative;color:var(--white);
      background:linear-gradient(180deg,var(--blue1) 0%, var(--blue2) 46%, var(--blue3) 100%);
      box-shadow:0 30px 70px rgba(31,75,143,.22);}
    .glow{position:absolute;right:-56px;top:-56px;width:220px;height:220px;border-radius:50%;
      background:radial-gradient(circle, rgba(255,255,255,.12) 0%, rgba(255,255,255,0) 72%);}
    .header{position:absolute;left:0;right:0;top:0;padding:28px 24px;display:flex;justify-content:space-between;align-items:center;z-index:10;}
    .icon{font-family:"Material Symbols Outlined";font-size:28px;line-height:1}
    .top{position:absolute;left:0;right:0;top:124px;padding:0 26px;z-index:8;}
    .kicker{font-size:12px;line-height:1;text-transform:uppercase;letter-spacing:.16em;color:var(--white-faint);font-weight:700;margin-bottom:18px;}
    .headline{font-family:"Luckiest Guy",cursive;font-size:40px;line-height:.96;letter-spacing:.01em;margin:0;max-width:280px;}
    .sub{margin-top:14px;max-width:296px;font-size:20px;line-height:1.12;color:var(--white-soft);font-weight:600;}

    .choice-grid{position:absolute;left:18px;right:18px;top:320px;display:grid;grid-template-columns:1fr 1fr;gap:14px;z-index:6;}
    .choice{appearance:none;border:1px solid var(--border);background:var(--glass);color:var(--white);border-radius:24px;min-height:138px;
      padding:16px 14px 14px;text-align:left;cursor:pointer;backdrop-filter:blur(10px);box-shadow:var(--shadow);
      transition:transform .18s ease, background .18s ease, border-color .18s ease;}
    .choice:hover{transform:translateY(-1px);background:var(--glass-strong);border-color:rgba(255,255,255,.14);}
    .choice.active{background:var(--active);border-color:rgba(255,255,255,.16);}
    .choice-icon{font-family:"Material Symbols Outlined";font-size:34px;line-height:1;display:block;margin-bottom:18px;}
    .choice-title{font-size:26px;line-height:1;font-weight:700;color:var(--white);}
    .choice-copy{margin-top:8px;font-size:16px;line-height:1.08;color:var(--white-soft);font-weight:700;max-width:140px;}

    .foot{position:absolute;left:18px;right:18px;bottom:20px;border-radius:18px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(8px);padding:12px 14px 11px;display:flex;justify-content:space-between;align-items:flex-end;gap:12px;z-index:6;}
    .foot-left{display:flex;flex-direction:column;gap:4px}
    .foot-label{font-size:10px;line-height:1;text-transform:uppercase;letter-spacing:.18em;color:var(--white-faint);font-weight:700}
    .foot-value{font-size:22px;line-height:1;font-weight:700;color:var(--white)}
    .foot-sub{font-size:15px;line-height:1.1;color:var(--white-soft)}
    .foot-right{display:flex;align-items:center;gap:6px;font-size:18px;line-height:1;font-weight:700;color:var(--white);white-space:nowrap}
  </style>
</head>
<body>
  <main class="phone">
    <div class="glow"></div>
    <header class="header">
      <div class="icon">arrow_back</div>
      <a class="icon" href="catchit_in_construction_gui.html" aria-label="UX Einstellungen öffnen">more_vert</a>
    </header>

    <section class="top">
      <div class="kicker">Wizard</div>
      <h1 class="headline">Wie soll es sich heute anfühlen?</h1>
      <div class="sub">Eine Auswahl reicht. CatchIt gewichtet danach Laufen, Puffer, Umstiege und Hektik neu.</div>
    </section>

    <section class="choice-grid">
      <button class="choice active" data-choice="ruhig">
        <span class="choice-icon">spa</span>
        <span class="choice-title">Ruhig</span>
        <div class="choice-copy">weniger Hektik und lieber stabil</div>
      </button>

      <button class="choice" data-choice="schnell">
        <span class="choice-icon">bolt</span>
        <span class="choice-title">Schnell</span>
        <div class="choice-copy">zügig, wenn es dadurch einfacher wird</div>
      </button>

      <button class="choice" data-choice="wenig">
        <span class="choice-icon">directions_walk</span>
        <span class="choice-title">Wenig laufen</span>
        <div class="choice-copy">mehr Nähe, weniger Fußweg</div>
      </button>

      <button class="choice" data-choice="puffer">
        <span class="choice-icon">schedule</span>
        <span class="choice-title">Mehr Puffer</span>
        <div class="choice-copy">lieber etwas Luft als zu knapp</div>
      </button>
    </section>

    <section class="foot">
      <div class="foot-left">
        <div class="foot-label">Wirkung</div>
        <div class="foot-value" id="footValue">Stabiler planen</div>
        <div class="foot-sub" id="footSub">CatchIt reduziert heute Hektik und gewichtet ruhigere Wege höher.</div>
      </div>
      <div class="foot-right">
        <span class="icon" style="font-size:20px;">touch_app</span>
        <span>1 Tap</span>
      </div>
    </section>
  </main>

  <script>
    const buttons = document.querySelectorAll('.choice');
    const footValue = document.getElementById('footValue');
    const footSub = document.getElementById('footSub');

    const copy = {
      ruhig: ["Stabiler planen", "CatchIt reduziert heute Hektik und gewichtet ruhigere Wege höher."],
      schnell: ["Kürzer entscheiden", "CatchIt darf heute direkter und zügiger priorisieren."],
      wenig: ["Fußweg senken", "CatchIt bevorzugt nähere Einstiege und weniger Gehstrecke."],
      puffer: ["Mehr Luft einbauen", "CatchIt gewichtet Reserve und Anschluss-Sicherheit stärker."]
    };

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.toggle('active', b === btn));
        const key = btn.dataset.choice;
        footValue.textContent = copy[key][0];
        footSub.textContent = copy[key][1];
      });
    });
  </script>
</body>
</html>
