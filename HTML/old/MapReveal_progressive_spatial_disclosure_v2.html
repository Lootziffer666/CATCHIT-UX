<!DOCTYPE html>
<html class="light" lang="de">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Archivo+Narrow:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "#f9f9ff",
            "warm-amber-soft": "#F3C86A",
            "route-mint": "#6CDC92"
          },
          fontFamily: {
            display: ["Luckiest Guy", "cursive"],
            body: ["Archivo Narrow", "sans-serif"],
            label: ["Archivo Narrow", "sans-serif"]
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .zen-gradient {
      background: linear-gradient(180deg, #42C2D5 0%, #3EA0D4 45%, #3281D6 100%);
    }
    .glass-bubble-zen {
      background: rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 12px 36px rgba(20, 55, 105, 0.12);
    }
    .header-decoration {
      position: absolute;
      top: -50px;
      right: -50px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 70%);
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
    }
    .selected-option {
      position: relative;
    }
    .selected-option::before {
      content: "";
      position: absolute;
      inset: -10px -10px -12px -10px;
      border-radius: 9999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.10);
      z-index: -1;
    }
    .status-neutral { color: rgba(255,255,255,0.9); }
    .status-soft { color: rgba(255,255,255,0.82); }
    .status-amber { color: #F3C86A; }

    .map-disclosure {
      position: relative;
      width: 100%;
      max-width: 24rem;
      height: 21rem;
      margin-top: 1.1rem;
      overflow: hidden;
      border-bottom-left-radius: 2rem;
      border-bottom-right-radius: 2rem;
      isolation: isolate;
    }
    .map-mask {
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.18) 10%, rgba(0,0,0,0.55) 22%, rgba(0,0,0,0.85) 34%, #000 46%);
      mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.18) 10%, rgba(0,0,0,0.55) 22%, rgba(0,0,0,0.85) 34%, #000 46%);
    }
    .map-overlay-fade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg,
          rgba(62,160,212,0.00) 0%,
          rgba(62,160,212,0.18) 14%,
          rgba(58,144,210,0.34) 25%,
          rgba(51,129,214,0.08) 42%,
          rgba(51,129,214,0.00) 58%);
      pointer-events: none;
      z-index: 2;
    }
    .map-road {
      position: absolute;
      background: rgba(255,255,255,0.10);
      border-radius: 999px;
    }
    .map-content {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0.92;
      mix-blend-mode: overlay;
    }
    .walk-info {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 1.15rem;
      display: flex;
      justify-content: space-between;
      align-items: end;
      padding: 0 1.5rem;
      z-index: 3;
    }
    .walk-meta {
      text-shadow: 0 1px 10px rgba(13, 36, 67, 0.18);
    }
  </style>
</head>
<body class="bg-background font-body text-white antialiased min-h-screen overflow-hidden selection:bg-white/20">
  <main class="zen-gradient min-h-screen relative flex flex-col items-center">
    <div class="header-decoration"></div>

    <header class="w-full flex items-center justify-between px-8 py-10 z-10">
      <span class="material-symbols-outlined text-white text-2xl cursor-pointer hover:opacity-80 transition-opacity">arrow_back</span>
      <span class="material-symbols-outlined text-white text-xl cursor-pointer hover:opacity-80 transition-opacity">more_vert</span>
    </header>

    <div class="flex-grow flex flex-col items-center w-full px-8 -mt-12">
      <p class="font-body text-white/90 text-[18px] mb-10 tracking-wide opacity-90">Spätestens los in:</p>

      <div class="glass-bubble-zen rounded-full w-56 h-56 flex flex-col items-center justify-center mb-20">
        <span class="font-display text-white text-7xl leading-none" style="letter-spacing: 0.02em;">15m</span>
      </div>

      <div class="w-full max-w-sm grid grid-cols-3 gap-6 items-start">
        <div class="flex flex-col items-center gap-1 pt-3">
          <span class="text-white/70 text-[10px] uppercase tracking-[0.24em] font-medium mb-1">Linie</span>
          <span class="font-body text-white text-[30px] font-semibold leading-none">491</span>
          <span class="status-soft text-[18px] mt-3">+2</span>
        </div>

        <div class="selected-option flex flex-col items-center gap-1 px-2 py-3">
          <span class="text-white/80 text-[10px] uppercase tracking-[0.24em] font-semibold mb-1">Aktiv</span>
          <span class="font-body text-white text-[40px] font-bold leading-none">21</span>
          <span class="status-neutral text-[18px] mt-2">+0</span>
        </div>

        <div class="flex flex-col items-center gap-1 pt-3">
          <span class="text-white/70 text-[10px] uppercase tracking-[0.24em] font-medium mb-1">Linie</span>
          <span class="font-body text-white text-[30px] font-semibold leading-none">295</span>
          <span class="status-amber text-[18px] mt-3">+17</span>
        </div>
      </div>

      <div class="map-disclosure absolute inset-x-0 bottom-0 top-[46%] z-10 mx-auto">
        <div class="w-full h-full relative overflow-hidden map-mask">
          <div class="map-content">
            <div class="absolute inset-0 bg-[radial-gradient(circle_at_72%_18%,rgba(255,255,255,0.22)_0%,rgba(255,255,255,0.02)_30%,rgba(255,255,255,0)_55%)]"></div>
            <div class="absolute inset-0 bg-[linear-gradient(180deg,rgba(255,255,255,0.04)_0%,rgba(255,255,255,0.01)_100%)]"></div>

            <div class="map-road" style="left:2.4rem; top:4.4rem; width:16rem; height:0.12rem;"></div>
            <div class="map-road" style="left:3.8rem; top:9.8rem; width:13rem; height:0.12rem;"></div>
            <div class="map-road" style="left:10.2rem; top:14.4rem; width:9rem; height:0.12rem;"></div>
            <div class="map-road" style="left:5.4rem; top:3.0rem; width:0.12rem; height:12rem;"></div>
            <div class="map-road" style="left:12.7rem; top:5.2rem; width:0.12rem; height:8rem;"></div>
            <div class="map-road" style="left:17.5rem; top:2.8rem; width:0.12rem; height:10rem;"></div>

            <div class="absolute inset-0 flex items-center justify-center">
              <svg class="absolute inset-0 w-full h-full" viewBox="0 0 390 486" aria-hidden="true">
                <path class="opacity-70" d="M 196 438 Q 192 360 214 305 T 176 182" fill="none" stroke="#6CDC92" stroke-dasharray="1 10" stroke-linecap="round" stroke-width="5"></path>
                <circle class="opacity-88" cx="176" cy="182" fill="#6CDC92" r="6"></circle>
                <circle class="opacity-20" cx="176" cy="182" fill="#6CDC92" r="14"></circle>
              </svg>
              <div class="absolute bottom-16 left-1/2 -translate-x-1/2 w-3 h-3 bg-white rounded-full shadow-[0_0_15px_rgba(255,255,255,0.6)]"></div>
            </div>
          </div>

          <div class="map-overlay-fade"></div>

          <div class="walk-info">
            <div class="flex flex-col walk-meta">
              <span class="text-white/46 font-body text-[10px] font-bold tracking-[0.22em] uppercase mb-0.5">Fußweg</span>
              <span class="text-white font-body text-[30px] font-bold leading-none">450 Meter</span>
            </div>
            <div class="flex items-center gap-1.5 mb-1 opacity-90 walk-meta">
              <span class="material-symbols-outlined text-white text-lg">directions_walk</span>
              <span class="text-white font-body text-[22px] font-bold leading-none">6 Min</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
