<!DOCTYPE html>
<html class="light" lang="de">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Archivo+Narrow:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "#f9f9ff",
            "soft-red": "#C95A5A",
            "soft-red-deep": "#B64545",
            "soft-red-light": "#D97B7B"
          },
          fontFamily: {
            display: ["Luckiest Guy", "cursive"],
            body: ["Archivo Narrow", "sans-serif"],
            label: ["Archivo Narrow", "sans-serif"]
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .failed-gradient {
      background: linear-gradient(180deg, #D97B7B 0%, #C95A5A 46%, #B64545 100%);
    }
    .header-decoration {
      position: absolute;
      top: -50px;
      right: -50px;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0) 72%);
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
    }
    .failure-surface {
      background: rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 14px 42px rgba(90, 22, 22, 0.14);
    }
    .continuity-block {
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 1.25rem;
      padding: 0.8rem 1rem;
      width: 100%;
      max-width: 20rem;
    }
    .micro-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.38rem 0.72rem;
      border-radius: 9999px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.96);
      font-size: 14px;
      line-height: 1;
    }
    .support-line {
      color: rgba(255,255,255,0.93);
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body class="bg-background font-body text-white antialiased min-h-screen overflow-hidden selection:bg-white/20">
  <main class="failed-gradient min-h-screen relative flex flex-col items-center">
    <div class="header-decoration"></div>

    <header class="w-full flex items-center justify-between px-8 py-10 z-10">
      <span class="material-symbols-outlined text-white text-2xl cursor-pointer hover:opacity-80 transition-opacity">arrow_back</span>
      <span class="material-symbols-outlined text-white text-xl cursor-pointer hover:opacity-80 transition-opacity">more_vert</span>
    </header>

    <div class="flex-grow flex flex-col items-center justify-center w-full px-8 -mt-12">
      <p class="font-body text-white/92 text-[18px] mb-8 tracking-wide opacity-95">Nicht mehr machbar:</p>

      <div class="failure-surface rounded-[2rem] w-full max-w-[19rem] min-h-[14rem] flex flex-col items-center justify-center px-6 py-8 mb-16 text-center" data-flow="Recovery_simple_switch_v1.html">
        <p class="font-display text-white text-[40px] leading-[0.95]">Das klappt</p>
        <p class="font-body text-white/94 text-[24px] font-semibold mt-4 leading-tight">so nicht mehr</p>
        <p class="font-body text-white/84 text-[18px] mt-3">Der Anschluss ist sicher weg</p>
      </div>

      <div class="mt-0 flex flex-col items-center gap-3 min-h-[86px] w-full">
        <div class="micro-pill">
          <span class="material-symbols-outlined text-[18px]" style="font-variation-settings:'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 20;">close</span>
          <span>Diese Lösung ist beendet</span>
        </div>
        <div class="continuity-block" data-flow="Recovery_recheck_noetig_v1.html">
          <p class="font-body text-white text-[17px] font-semibold leading-tight">Neue Basis nötig</p>
          <p class="font-body text-white/84 text-[16px] mt-1 leading-snug">CatchIt braucht jetzt eine andere Verbindung oder eine neu sortierte Kette.</p>
        </div>
      </div>
    </div>
  </main>
<script src="screen-nav.js"></script>
</body>
</html>
