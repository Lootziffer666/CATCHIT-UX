<!DOCTYPE html>
<html class="light" lang="de">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>CatchIt Map Focus Lean v3</title>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Archivo+Narrow:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "#f9f9ff"
          },
          fontFamily: {
            display: ["Luckiest Guy", "cursive"],
            body: ["Archivo Narrow", "sans-serif"]
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .map-gradient {
      background: linear-gradient(180deg, #4DB9E6 0%, #2EA7E0 46%, #1F4B8F 100%);
    }
    .header-decoration {
      position: absolute;
      top: -50px;
      right: -50px;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0) 72%);
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
    }
    .glass-bubble {
      background: rgba(255,255,255,0.16);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 30px rgba(20,55,105,0.12);
    }
    .glass-switcher {
      background: rgba(255,255,255,0.11);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 8px 20px rgba(20,55,105,0.10);
    }
    .glass-switcher.active {
      background: rgba(255,255,255,0.17);
      border-color: rgba(255,255,255,0.14);
    }
    .glass-map {
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 14px 40px rgba(13,36,67,0.14);
    }
    .glass-info {
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Map rendering */
    .map-bg {
      position: absolute;
      inset: 0;
      background: #cfd5dc;
    }
    .green-zone {
      position: absolute;
      right: 0;
      top: 0;
      width: 112px;
      height: 84px;
      background: #c8e2cf;
      border-radius: 0 0 0 34px;
      opacity: 0.95;
    }
    .road {
      position: absolute;
      background: #9aaebe;
      border-radius: 999px;
    }
    .road.soft {
      background: #b9c4cf;
    }
    .building {
      position: absolute;
      background: #cfd4db;
      border-radius: 12px;
      border: 1px solid rgba(120,130,150,0.10);
    }
    .label {
      position: absolute;
      color: rgba(82,95,110,0.70);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-shadow: 0 1px 0 rgba(255,255,255,0.35);
      z-index: 2;
    }
    .route-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 4;
    }
  </style>
</head>
<body class="bg-background font-body text-white antialiased min-h-screen overflow-hidden selection:bg-white/20">

  <main class="map-gradient min-h-screen relative flex flex-col">
    <div class="header-decoration"></div>

    <!-- Header -->
    <header class="w-full flex items-center justify-between px-6 pt-7 pb-4 z-10">
      <span class="material-symbols-outlined text-white text-[28px] cursor-pointer hover:opacity-80 transition-opacity">arrow_back</span>
    </header>

    <!-- Top row: active line + time bubble; alternatives as tiny side info -->
    <section class="flex items-center justify-between px-[22px] pt-3 pb-3 z-10">
      <div class="flex flex-col gap-1.5">
        <button class="glass-switcher active rounded-full px-3.5 py-2 inline-flex items-baseline gap-2 text-white cursor-pointer font-body self-start" data-line="21">
          <span class="text-[22px] leading-none font-bold">21</span>
          <span class="text-[13px] leading-none text-white/[0.76] font-bold">+0</span>
        </button>
        <div class="inline-flex items-center gap-3 pl-1 text-[12px] leading-none text-white/[0.66] font-bold">
          <button class="cursor-pointer hover:text-white transition-colors" data-line="491">491 +2</button>
          <button class="cursor-pointer hover:text-[#F3C86A] transition-colors" data-line="295"><span class="text-[#F3C86A]">295 +17</span></button>
        </div>
      </div>

      <div class="glass-bubble w-[90px] h-[90px] rounded-full flex flex-col items-center justify-center flex-shrink-0">
        <span class="font-display text-[28px] leading-none tracking-[0.02em]">15</span>
        <span class="mt-1 text-xs leading-none uppercase tracking-[0.18em] text-white/[0.82] font-bold">min</span>
      </div>
    </section>

    <!-- Map card (flex-grow to fill available space) -->
    <section class="glass-map rounded-[28px] mx-[18px] flex-grow overflow-hidden relative z-10 mb-[108px]">
      <div class="map-bg"></div>
      <div class="green-zone"></div>

      <!-- Roads -->
      <div class="road" style="left:-12px; top:64px; width:284px; height:34px; transform:rotate(12deg);"></div>
      <div class="road" style="left:216px; top:76px; width:170px; height:24px; transform:rotate(2deg);"></div>
      <div class="road" style="left:72px; top:126px; width:32px; height:206px; transform:rotate(28deg);"></div>
      <div class="road" style="left:38px; top:306px; width:274px; height:24px; transform:rotate(-8deg);"></div>
      <div class="road" style="left:226px; top:378px; width:146px; height:20px; transform:rotate(4deg);"></div>
      <div class="road" style="left:282px; top:208px; width:22px; height:164px; transform:rotate(18deg);"></div>

      <!-- Buildings -->
      <div class="building" style="left:28px; top:118px; width:112px; height:84px; transform:rotate(-10deg);"></div>
      <div class="building" style="left:230px; top:138px; width:120px; height:96px; transform:rotate(-12deg);"></div>
      <div class="building" style="left:56px; top:258px; width:126px; height:94px; transform:rotate(-8deg);"></div>
      <div class="building" style="left:226px; top:262px; width:86px; height:66px; transform:rotate(-8deg);"></div>
      <div class="building" style="left:136px; top:370px; width:160px; height:84px; transform:rotate(-9deg);"></div>

      <!-- Labels -->
      <div class="label" style="left:210px; top:60px; transform:rotate(18deg); font-size:15px;">Friedrich-Ebert-Str.</div>
      <div class="label" style="left:76px; top:166px; transform:rotate(-64deg); font-size:15px;">Amselweg</div>
      <div class="label" style="left:128px; top:332px; transform:rotate(-8deg); font-size:15px;">Carolus-Magnus-Strasse</div>

      <!-- SVG route overlay -->
      <svg class="route-svg" viewBox="0 0 390 554" aria-hidden="true">
        <path id="routePath" d="M 296 470 C 274 458 245 442 220 430 C 194 418 166 403 148 380 C 126 352 118 316 120 282 C 123 248 142 214 168 182 C 196 148 228 122 256 96" fill="none" stroke="#f7f7fb" stroke-linecap="round" stroke-width="7" stroke-dasharray="1 16"></path>
        <circle id="startDot" cx="296" cy="470" fill="#50c88a" r="6"></circle>
        <circle id="endDot" cx="256" cy="96" fill="#f1f2f8" r="7"></circle>
      </svg>

      <!-- Walk anchor -->
      <div class="absolute left-[18px] right-[18px] bottom-4 z-[6] flex items-end justify-between gap-3.5" style="text-shadow: 0 1px 10px rgba(13,36,67,0.10);">
        <div>
          <div class="text-[10px] leading-none uppercase tracking-[0.22em] font-bold text-white/[0.56] mb-1">Estimated Walk</div>
          <div class="text-[38px] leading-[0.95] font-bold text-white" id="walkValue">450 Meters</div>
        </div>
        <div class="flex items-center gap-1.5 mb-1 text-[22px] leading-none font-bold text-white whitespace-nowrap">
          <span class="material-symbols-outlined text-[22px]">directions_walk</span>
          <span id="walkTime">6 Min</span>
        </div>
      </div>
    </section>

    <!-- Info strip -->
    <section class="glass-info rounded-[18px] mx-[18px] px-3.5 py-3 flex items-center justify-between gap-3 absolute left-0 right-0 bottom-[18px] z-20 cursor-pointer" data-flow="GoMode_walk_to_stop_v1.html">
      <div class="flex flex-col gap-0.5">
        <span class="text-[24px] leading-none font-bold text-white" id="stopValue">Central St.</span>
        <span class="text-[14px] leading-tight text-white/[0.72]" id="stopSub">Linie 21 · direkt</span>
      </div>
      <div class="flex items-center gap-1.5 text-[18px] leading-none font-bold text-white whitespace-nowrap">
        <span class="material-symbols-outlined text-[18px]">directions_walk</span>
        <span id="chipTime">6 Min</span>
      </div>
    </section>
  </main>

  <script>
    const buttons = document.querySelectorAll('[data-line]');
    const activeBtn = document.querySelector('.glass-switcher.active');
    const routePath = document.getElementById('routePath');
    const startDot = document.getElementById('startDot');
    const endDot = document.getElementById('endDot');
    const walkValue = document.getElementById('walkValue');
    const walkTime = document.getElementById('walkTime');
    const stopValue = document.getElementById('stopValue');
    const stopSub = document.getElementById('stopSub');
    const chipTime = document.getElementById('chipTime');

    const lineData = {
      "491": { path: "M 296 470 C 278 454 252 438 228 414 C 204 390 182 360 176 324 C 169 286 178 248 196 212 C 216 174 242 142 274 112", sx: 296, sy: 470, ex: 274, ey: 112, walk: "380 Meters", time: "5 Min", stop: "Amselweg", sub: "Linie 491 · +2", delay: "+2" },
      "21":  { path: "M 296 470 C 274 458 245 442 220 430 C 194 418 166 403 148 380 C 126 352 118 316 120 282 C 123 248 142 214 168 182 C 196 148 228 122 256 96",  sx: 296, sy: 470, ex: 256, ey: 96,  walk: "450 Meters", time: "6 Min", stop: "Central St.", sub: "Linie 21 · direkt", delay: "+0" },
      "295": { path: "M 296 470 C 278 460 252 446 228 438 C 198 428 172 414 154 392 C 130 362 120 326 122 286 C 124 244 142 198 178 150 C 214 112 254 94 304 88",  sx: 296, sy: 470, ex: 304, ey: 88,  walk: "520 Meters", time: "7 Min", stop: "Market", sub: "Linie 295 · +17", delay: "+17" }
    };

    function setLine(line){
      const d = lineData[line];
      activeBtn.dataset.line = line;
      activeBtn.innerHTML = '<span class="text-[22px] leading-none font-bold">' + line + '</span><span class="text-[13px] leading-none text-white/[0.76] font-bold">' + d.delay + '</span>';
      routePath.setAttribute('d', d.path);
      startDot.setAttribute('cx', d.sx);
      startDot.setAttribute('cy', d.sy);
      endDot.setAttribute('cx', d.ex);
      endDot.setAttribute('cy', d.ey);
      walkValue.textContent = d.walk;
      walkTime.textContent = d.time;
      chipTime.textContent = d.time;
      stopValue.textContent = d.stop;
      stopSub.textContent = d.sub;
    }

    buttons.forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); setLine(btn.dataset.line); }));
    setLine('21');
  </script>
  <script src="screen-nav.js"></script>
</body>
</html>
