<!DOCTYPE html>
<html class="light" lang="de">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>CatchIt Suche – Haltestellen &amp; POIs</title>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Archivo+Narrow:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "#f9f9ff"
          },
          fontFamily: {
            display: ["Luckiest Guy", "cursive"],
            body: ["Archivo Narrow", "sans-serif"]
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .blue-gradient {
      background: linear-gradient(180deg, #4DB9E6 0%, #2EA7E0 46%, #1F4B8F 100%);
    }
    .header-decoration {
      position: absolute;
      top: -50px;
      right: -50px;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 70%);
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
    }
    .glass-search {
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 18px 42px rgba(20,55,105,0.14);
    }
    .glass-result {
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 18px 42px rgba(20,55,105,0.14);
    }
    .glass-result-primary {
      background: rgba(255,255,255,0.20);
      border-color: rgba(255,255,255,0.14);
    }
    .glass-footer {
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 18px 42px rgba(20,55,105,0.14);
    }
  </style>
</head>
<body class="bg-background font-body text-white antialiased min-h-screen overflow-hidden selection:bg-white/20">

  <main class="blue-gradient min-h-screen relative flex flex-col">
    <div class="header-decoration"></div>

    <!-- Header -->
    <header class="w-full flex items-center justify-between px-8 py-10 z-10">
      <span class="material-symbols-outlined text-white text-2xl cursor-pointer hover:opacity-80 transition-opacity">arrow_back</span>
    </header>

    <!-- Kicker / Headline -->
    <section class="px-7 z-10">
      <p class="text-[12px] font-bold uppercase tracking-[0.16em] text-white/56 mb-4 leading-none">Suche</p>
      <h1 class="font-display text-[38px] leading-[0.96] tracking-[0.01em] max-w-[286px]">Was suchst du?</h1>
    </section>

    <!-- Search area -->
    <section class="flex-1 flex flex-col px-[18px] pt-5 pb-0 z-10 gap-3">

      <!-- Search row: input + locate button -->
      <div class="grid grid-cols-[1fr_auto] gap-2.5">
        <div class="glass-search rounded-[22px] px-4 py-3.5 flex items-center gap-2.5">
          <span class="material-symbols-outlined text-[24px] text-white/84">search</span>
          <span class="text-[24px] leading-none font-bold text-white">friedr</span>
        </div>
        <button class="glass-search rounded-[22px] px-3.5 min-w-[74px] flex items-center justify-center gap-1.5 cursor-pointer text-white font-bold text-[15px] leading-none">
          <span class="material-symbols-outlined text-[20px]">my_location</span>
          <span>Standort</span>
        </button>
      </div>

      <!-- Result list -->
      <div class="grid gap-2 mt-1">

        <!-- Result 1: Best match (primary) -->
        <div class="glass-result glass-result-primary rounded-[20px] px-4 py-3.5 flex items-start justify-between gap-3 cursor-pointer" data-flow="Chain_summary_v1.html">
          <div class="flex flex-col gap-[5px] min-w-0">
            <span class="text-[26px] font-bold leading-none text-white">Friedrich-Ebert-Str.</span>
            <span class="text-[15px] font-bold leading-[1.1] text-white/84">Haltestelle &middot; Linien 21, 431</span>
          </div>
          <div class="flex flex-col items-end gap-1 whitespace-nowrap">
            <span class="text-[20px] font-bold leading-none text-white">220 m</span>
            <span class="text-[13px] font-bold leading-none text-white/84">3 Min</span>
          </div>
        </div>

        <!-- Result 2: Second match (compact) -->
        <div class="rounded-[16px] px-4 py-2.5 flex items-center justify-between gap-3">
          <div class="flex flex-col min-w-0">
            <span class="text-[19px] font-bold leading-tight text-white/84">Friedrichplatz</span>
            <span class="text-[13px] leading-tight text-white/56">Haltestelle</span>
          </div>
          <span class="text-[15px] font-bold text-white/84 whitespace-nowrap">540 m</span>
        </div>

        <!-- Result 3 (compact) -->
        <div class="rounded-[16px] px-4 py-2.5 flex items-center justify-between gap-3">
          <div class="flex flex-col min-w-0">
            <span class="text-[19px] font-bold leading-tight text-white/84">Markt</span>
            <span class="text-[13px] leading-tight text-white/56">Ort</span>
          </div>
          <span class="text-[15px] font-bold text-white/84 whitespace-nowrap">620 m</span>
        </div>

      </div>
    </section>
  </main>
<script src="screen-nav.js"></script>
</body>
</html>
